# Whisper-only configuration (simplified, no Canary)

# General settings
general:
  device: "cpu"  # cuda or cpu
  num_threads: 4
  output_format: "json"
  log_level: "INFO"

# Diarization settings
diarization:
  model_name: "pyannote/speaker-diarization-3.1"
  device: "cpu"  # cuda or cpu
  min_speakers: null
  max_speakers: null
  hf_token: null  # IMPORTANT: Set your HuggingFace token here or in .env

# Whisper ASR settings
whisper:
  model_size: "base"  # tiny, base, small, medium, large-v3 (use base for CPU)
  device: "cpu"
  compute_type: "int8"  # int8 for CPU, float16 for GPU
  language: null  # null for auto-detection
  beam_size: 5
  word_timestamps: true
  vad_filter: true

# Output settings
output:
  include_timestamps: true
  include_confidence_scores: true
  include_speaker_labels: true
